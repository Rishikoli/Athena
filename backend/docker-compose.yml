version: '3.8'

services:
  postgres:
    # Uses pgvector extension natively, simulating AlloyDB vector column capabilities locally
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: aicos_admin
      POSTGRES_PASSWORD: AthenaPassword123!
      POSTGRES_DB: aicos
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
